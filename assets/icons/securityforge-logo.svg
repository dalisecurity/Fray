<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cyberpunk Neon Gradients -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="neonPurple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b026ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d946ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f72585;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#b026ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#darkBg)"/>
  
  <!-- Ambient Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Geometric Grid Pattern -->
  <g opacity="0.15" stroke="#00f5ff" stroke-width="0.5" fill="none">
    <line x1="256" y1="50" x2="256" y2="462"/>
    <line x1="50" y1="256" x2="462" y2="256"/>
    <circle cx="256" cy="256" r="80"/>
    <circle cx="256" cy="256" r="120"/>
    <circle cx="256" cy="256" r="160"/>
    <circle cx="256" cy="256" r="200"/>
  </g>
  
  <!-- Hexagonal Shield Frame -->
  <g filter="url(#neonGlow)">
    <path d="M 256 70 L 380 130 L 380 250 L 256 310 L 132 250 L 132 130 Z" 
          fill="none" 
          stroke="url(#neonCyan)" 
          stroke-width="3"/>
    
    <path d="M 256 85 L 365 135 L 365 245 L 256 295 L 147 245 L 147 135 Z" 
          fill="none" 
          stroke="url(#neonPurple)" 
          stroke-width="2"
          opacity="0.7"/>
  </g>
  
  <!-- Central Shield Icon with Neon Effect -->
  <g filter="url(#strongGlow)">
    <!-- Shield Body -->
    <path d="M 256 120 L 340 150 L 340 240 Q 340 290 256 330 Q 172 290 172 240 L 172 150 Z" 
          fill="url(#darkBg)"
          stroke="url(#neonCyan)" 
          stroke-width="3"/>
    
    <!-- Inner Shield Glow -->
    <path d="M 256 135 L 325 160 L 325 235 Q 325 275 256 305 Q 187 275 187 235 L 187 160 Z" 
          fill="none"
          stroke="url(#neonPurple)" 
          stroke-width="2"
          opacity="0.8"/>
  </g>
  
  <!-- Lock Symbol with Cyberpunk Style -->
  <g filter="url(#neonGlow)">
    <!-- Lock Body -->
    <rect x="230" y="230" width="52" height="55" rx="4" 
          fill="url(#darkBg)"
          stroke="url(#neonCyan)" 
          stroke-width="2.5"/>
    
    <!-- Lock Shackle -->
    <path d="M 238 230 L 238 210 Q 238 195 256 195 Q 274 195 274 210 L 274 230" 
          stroke="url(#neonPurple)" 
          stroke-width="3" 
          fill="none"
          stroke-linecap="round"/>
    
    <!-- Keyhole -->
    <circle cx="256" cy="250" r="6" fill="url(#neonCyan)"/>
    <rect x="253" y="250" width="6" height="15" rx="1" fill="url(#neonCyan)"/>
  </g>
  
  <!-- Checkmark with Neon Glow -->
  <g filter="url(#strongGlow)">
    <path d="M 240 255 L 250 265 L 272 243" 
          stroke="#00ff88" 
          stroke-width="4" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
  
  <!-- Corner Accents (Cyberpunk Style) -->
  <g stroke="url(#neonCyan)" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 100 100 L 80 100 L 80 80 L 100 80"/>
    <path d="M 412 100 L 432 100 L 432 80 L 412 80"/>
    <path d="M 100 412 L 80 412 L 80 432 L 100 432"/>
    <path d="M 412 412 L 432 412 L 432 432 L 412 432"/>
  </g>
  
  <!-- Digital Circuit Lines -->
  <g stroke="url(#neonPurple)" stroke-width="1" fill="none" opacity="0.3">
    <path d="M 150 340 L 180 340 L 180 360 L 210 360"/>
    <path d="M 362 340 L 332 340 L 332 360 L 302 360"/>
    <circle cx="180" cy="340" r="2" fill="url(#neonPurple)"/>
    <circle cx="332" cy="340" r="2" fill="url(#neonPurple)"/>
  </g>
  
  <!-- Binary Code Pattern (Cyberpunk Style) -->
  <g font-family="'Courier New', monospace" font-size="10" fill="url(#neonCyan)" opacity="0.4" font-weight="bold">
    <text x="160" y="380">1010</text>
    <text x="320" y="380">1101</text>
    <text x="160" y="120">0110</text>
    <text x="320" y="120">1001</text>
  </g>
  
  <!-- Scanning Line Effect -->
  <g opacity="0.2">
    <rect x="80" y="200" width="352" height="2" fill="url(#neonCyan)"/>
    <rect x="80" y="280" width="352" height="1" fill="url(#neonPurple)"/>
  </g>
  
  <!-- Outer Ring Segments -->
  <g filter="url(#neonGlow)" opacity="0.5">
    <path d="M 256 40 A 216 216 0 0 1 400 90" 
          stroke="url(#neonCyan)" 
          stroke-width="2" 
          fill="none"
          stroke-dasharray="10,5"/>
    <path d="M 422 256 A 216 216 0 0 1 400 400" 
          stroke="url(#neonPurple)" 
          stroke-width="2" 
          fill="none"
          stroke-dasharray="10,5"/>
    <path d="M 256 472 A 216 216 0 0 1 112 422" 
          stroke="url(#neonCyan)" 
          stroke-width="2" 
          fill="none"
          stroke-dasharray="10,5"/>
    <path d="M 90 256 A 216 216 0 0 1 112 112" 
          stroke="url(#neonPurple)" 
          stroke-width="2" 
          fill="none"
          stroke-dasharray="10,5"/>
  </g>
  
  <!-- Glowing Dots at Key Points -->
  <g filter="url(#strongGlow)">
    <circle cx="256" cy="70" r="3" fill="#00f5ff"/>
    <circle cx="380" cy="130" r="3" fill="#b026ff"/>
    <circle cx="380" cy="250" r="3" fill="#00f5ff"/>
    <circle cx="256" cy="310" r="3" fill="#b026ff"/>
    <circle cx="132" cy="250" r="3" fill="#00f5ff"/>
    <circle cx="132" cy="130" r="3" fill="#b026ff"/>
  </g>
</svg>
