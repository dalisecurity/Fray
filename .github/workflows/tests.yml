name: Tests

on:
  push:
    branches: [ hugo, main ]
  pull_request:
    branches: [ hugo, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -e .
        pip install "mcp[cli]>=1.2.0" || true

    - name: Lint (syntax errors only)
      run: |
        pip install flake8
        flake8 fray/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run test suite
      run: |
        python -m pytest tests/test_package.py tests/test_recon.py -v --tb=short

    - name: Verify package import
      run: |
        python -c "import fray; print(f'Fray v{fray.__version__} OK')"
