name: QA — 10 Vulnerable Target Smoke Test

on:
  push:
    branches: [main, hugo]
    paths:
      - 'fray/**'
      - 'payloads/**'
  pull_request:
    branches: [main]
    paths:
      - 'fray/**'
      - 'payloads/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode: quick (detect+recon) or full (+payload test)'
        required: false
        default: 'quick'

permissions:
  contents: read

jobs:
  qa-smoke-test:
    name: QA Smoke Test (10 targets)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Fray
      run: pip install -e .

    - name: Run QA smoke test (10 vulnerable targets)
      run: |
        MODE="${{ github.event.inputs.mode || 'quick' }}"
        echo "QA smoke test: mode=$MODE, 10 targets"

        # Run pytest QA tests first
        python -m pytest tests/test_qa_targets.py -v --tb=short -m qa -k "TestSmokeRunner" || true

        # Run smoke runner against all 10 targets
        if [ "$MODE" = "full" ]; then
          python -m fray smoke --full --json > smoke_results.json 2>&1
        else
          python -m fray smoke --quick --json > smoke_results.json 2>&1
        fi

        cat smoke_results.json | python -m json.tool 2>/dev/null || cat smoke_results.json

        FAILED=$(python -c "import json; d=json.load(open('smoke_results.json')); print(d.get('failed', 0))" 2>/dev/null || echo "0")
        PASSED=$(python -c "import json; d=json.load(open('smoke_results.json')); print(d.get('passed', 0))" 2>/dev/null || echo "0")
        echo "QA Results: $PASSED passed, $FAILED failed out of 10 targets"

        # Allow up to 3 failures (external sites may be temporarily down)
        if [ "$FAILED" -gt "3" ]; then
          echo "::error::Too many QA target failures: $FAILED/10"
          exit 1
        fi

    - name: Upload smoke test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-test-results
        path: smoke_results.json
        retention-days: 30
