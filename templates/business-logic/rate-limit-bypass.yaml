id: biz-rate-limit-bypass
info:
  name: Rate Limit Bypass via Header Manipulation
  author: dalisec
  severity: medium
  tags: business-logic,rate-limit,brute-force
  description: Tests whether rate limiting can be bypassed by manipulating IP-related headers or using slight request variations.
  reference:
    - https://owasp.org/www-community/controls/Blocking_Brute_Force_Attacks

requests:
  - method: POST
    path:
      - "{{BaseURL}}/api/login"
      - "{{BaseURL}}/api/auth/login"
      - "{{BaseURL}}/login"
    headers:
      Content-Type: "application/json"
      X-Forwarded-For: "127.0.0.1"
    body: '{"username":"admin","password":"test123"}'
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 401, 422]
        condition: or
      - type: word
        words: ["token", "invalid", "incorrect", "failed"]
        part: body
        condition: or
        negative: false

  - method: POST
    path:
      - "{{BaseURL}}/api/login"
      - "{{BaseURL}}/api/auth/login"
    headers:
      Content-Type: "application/json"
      X-Real-IP: "10.0.0.1"
      X-Originating-IP: "192.168.1.1"
      X-Client-IP: "172.16.0.1"
    body: '{"username":"admin","password":"test456"}'
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 401, 422]
        condition: or
